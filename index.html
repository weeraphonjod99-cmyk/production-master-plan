<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Production Master Plan</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-labelledby="page-title">
        <div class="topbar">
          <div>
            <p class="eyebrow">Production Planning</p>
            <h1 id="page-title">Master Plan</h1>
          </div>
          <div class="actions">
            <a class="button primary" href="https://docs.google.com/spreadsheets/d/1iedzv4R7oyw1x7mjAAsAGlVHan7eFBAOVfgaoIWYWkU/edit#gid=424242002" target="_blank" rel="noreferrer">
              เปิด Master Plan
            </a>
            <a class="button" href="https://docs.google.com/spreadsheets/d/1iedzv4R7oyw1x7mjAAsAGlVHan7eFBAOVfgaoIWYWkU/edit#gid=424242003" target="_blank" rel="noreferrer">
              Machine Summary
            </a>
          </div>
        </div>

        <div class="overview-grid" aria-label="Production snapshot">
          <article class="metric">
            <span>เครื่องที่มีงาน</span>
            <strong id="machineCount">0</strong>
          </article>
          <article class="metric">
            <span>Order ทั้งหมด</span>
            <strong id="orderCount">0</strong>
          </article>
          <article class="metric">
            <span>ยอดค้างหลังแผน</span>
            <strong id="remainingQty">0</strong>
          </article>
          <article class="metric warning">
            <span>เครื่องเกินกำลัง</span>
            <strong id="overCapacity">0</strong>
          </article>
        </div>

        <section class="control-panel" aria-label="Machine controls">
          <label class="search-field">
            <span>ค้นหา</span>
            <input id="searchInput" type="search" placeholder="เครื่องหรือสถานะ" />
          </label>
          <label class="select-field">
            <span>สถานะ</span>
            <select id="statusFilter">
              <option value="all">ทั้งหมด</option>
              <option value="Over capacity">Over capacity</option>
              <option value="Tight">Tight</option>
              <option value="OK">OK</option>
            </select>
          </label>
          <button class="button compact" id="resetButton" type="button">ล้างตัวกรอง</button>
        </section>

        <section class="status-strip" aria-label="Capacity lanes">
          <div class="lane-label">
            <span>Capacity load</span>
            <strong>31 วัน</strong>
          </div>
          <div class="lane-track" id="laneTrack"></div>
        </section>

        <section class="table-wrap" aria-label="Machine summary table">
          <table>
            <thead>
              <tr>
                <th>Machine</th>
                <th>Orders</th>
                <th>Order Qty</th>
                <th>Remain</th>
                <th>Forecast Days</th>
                <th>Utilization</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="summaryRows"></tbody>
          </table>
        </section>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
